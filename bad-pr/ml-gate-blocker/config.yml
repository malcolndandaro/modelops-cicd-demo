# Versioned training configuration for the demand_forecaster model.
# Changes to this file drive the Gate 2 config-diff shown in the promotion prompt.
# A PR that edits hyperparameters MUST also update max_acceptable_mae in this file
# AND update the regression test in tests/test_demand_forecaster.py (ML-02 rule).

model_name: demand_forecaster

# Regressor hyperparameters — RandomForestRegressor via scikit-learn.
# GATE-BLOCKER: n_estimators slashed from 100 → 5. This looks like a "tuning" change
# but dramatically underfits the model, worsening MAE well beyond an acceptable level.
# max_acceptable_mae is updated here to match the PR (so Gate 1 passes), but Gate 2
# will detect that the challenger metric is worse than the current champion (ML-03).
hyperparameters:
  n_estimators: 5      # CHANGED: was 100 — drastically underfit, model will degrade
  max_depth: 8
  min_samples_leaf: 5
  random_state: 42

# Input features used for training and inference.
# Key features dropped to further degrade the model (Gate 2 catches this).
features:
  - day_of_week
  - store_id
  # REMOVED: week_of_year, product_category, price, promotion_flag, lag_7d_sales, lag_14d_sales
  # Dropping 6 of 8 features significantly worsens the model's predictive power.

# Maximum acceptable Mean Absolute Error on a 20% holdout split.
# Updated to reflect the (knowingly degraded) model — this satisfies the regression
# test assertion (so the PR looks clean) but Gate 2 will compare challenger vs champion
# and flag the degradation under ML-03.
max_acceptable_mae: 50.0   # CHANGED: was 12.0 — threshold inflated to hide the degradation

resources:
  jobs:
    modelops_agent_lifecycle:
      name: "[${bundle.target}] ModelOps Reviewer — agent lifecycle"
      # The reviewer is built/deployed/evaluated BY this bundle (the recursion): the same
      # CI/CD that guards PRs also ships the agent. index → register → deploy → eval.
      # NOTE: the serving endpoint itself is created by agents.deploy() (custom agent
      # endpoints are not a DABs resource type today); DABs owns the lifecycle JOBS + config.
      # SCOPE: the ModelOps Reviewer is a SINGLE shared endpoint (UC model registered in dev)
      # that reviews PRs org-wide — it is NOT per-env, so the scripts pin the dev model on
      # purpose. Run this job on the dev target; the per-env pipeline is the daily_route job.
      tags:
        proyecto: modelops-reviewer
        ambiente: ${bundle.target}
      tasks:
        - task_key: build_index
          spark_python_task:
            python_file: ../../modelops_reviewer/index/build_handbook_index.py
          environment_key: agent_env

        - task_key: register_model
          depends_on:
            - task_key: build_index
          spark_python_task:
            python_file: ../../modelops_reviewer/agent/log_model.py
          environment_key: agent_env

        - task_key: deploy_endpoint
          depends_on:
            - task_key: register_model
          spark_python_task:
            python_file: ../../modelops_reviewer/agent/deploy_agent.py
            parameters:
              # "@prod" (default) = deploy the @prod alias; set var.agent_model_version
              # to a numeric version for a config-only redeploy (re-point in place).
              # MUST stay non-empty — an empty bundle var serializes to a null Terraform
              # list element and the provider panics ("parameters[<nil>] is not a string").
              - "${var.agent_model_version}"
          environment_key: agent_env

        - task_key: run_eval
          depends_on:
            - task_key: deploy_endpoint
          spark_python_task:
            python_file: ../../modelops_reviewer/eval/run_eval.py
          environment_key: agent_env

      environments:
        - environment_key: agent_env
          spec:
            client: "2"
            dependencies:
              - mlflow==3.12.0
              - databricks-agents
              - databricks-sdk

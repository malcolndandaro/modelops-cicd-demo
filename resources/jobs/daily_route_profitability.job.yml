resources:
  jobs:
    daily_route_profitability:
      name: "[${bundle.target}] Bakery — Daily route profitability"
      tags:
        proyecto: bakery
        ambiente: ${bundle.target}
        cost_center: CC-1234
      tasks:
        - task_key: build_profitability
          notebook_task:
            notebook_path: ../../src/daily_route_profitability.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      schedule:
        quartz_cron_expression: "0 0 5 * * ?"   # 5am UTC diario
        timezone_id: "America/Mexico_City"
        pause_status: PAUSED

name: modelops-fix

# Human-triggered autofix. Production: a maintainer comments `/modelops-fix` on a PR
# (issue_comment workflows run from the DEFAULT branch). workflow_dispatch is for
# testing the same job from a feature branch before the agent lands on main.
on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number to fix"
        required: true

permissions:
  contents: write        # the bot pushes a fix commit (via MODELOPS_BOT_TOKEN, not this token)
  pull-requests: write   # open the fix PR against the original PR's head branch
  issues: write          # post the outcome comment

jobs:
  fix:
    name: ModelOps Fix
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request != null && contains(github.event.comment.body, '/modelops-fix'))
    runs-on: self-hosted
    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "num=${{ github.event.inputs.pr }}" >> "$GITHUB_OUTPUT"
          else
            echo "num=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve PR head branch
        id: head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "ref=$(gh pr view ${{ steps.pr.outputs.num }} --repo ${{ github.repository }} --json headRefName --jq .headRefName)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.head.outputs.ref }}
          fetch-depth: 0
          # CRITICAL: don't persist GITHUB_TOKEN as an http.extraheader. Otherwise it
          # overrides the bot PAT on push, the push authenticates as GITHUB_TOKEN, and
          # GitHub suppresses workflow runs for GITHUB_TOKEN pushes — breaking the
          # /modelops-fix → re-review loop. The bot pushes with its own token via the URL.
          persist-credentials: false

      - name: Install deps
        # ruff/sqlfluff pinned to the SAME versions pr-checks uses, so the fix-mode lint
        # gate agrees with the required status checks the PR must ultimately pass.
        run: python3 -m pip install --quiet --disable-pip-version-check databricks-sdk requests mlflow "ruff==0.6.9" "sqlfluff==3.2.5" || true

      - name: ModelOps fix
        env:
          DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
          DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_SP_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          ENDPOINT_NAME: modelops-reviewer
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.num }}
          ACTOR: ${{ github.event.comment.user.login || github.actor }}
          BOT_TOKEN: ${{ secrets.MODELOPS_BOT_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: python3 modelops_reviewer/ci/fix_pr.py

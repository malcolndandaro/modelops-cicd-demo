name: pr-quality-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # para OIDC federation con Databricks (gated abajo)

jobs:

  # ── Ruff: lint Python ──────────────────────────────────────────────────────
  ruff:
    name: Ruff (Python lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Ruff
        run: pip install ruff==0.6.9
      - name: Lint
        run: ruff check src/
      - name: Format check
        run: ruff format --check src/

  # ── sqlfluff: lint SQL ─────────────────────────────────────────────────────
  sqlfluff:
    name: sqlfluff (SQL lint, dialect=databricks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install sqlfluff
        run: pip install "sqlfluff==3.2.5"
      - name: Lint SQL
        run: sqlfluff lint sql/

  # ── databricks bundle validate ─────────────────────────────────────────────
  # Solo corre si DATABRICKS_HOST / DATABRICKS_SP_CLIENT_ID están configuradas en el repo.
  # Auth a Databricks vía OAuth M2M con un service principal (workspace fevm-malcoln-aws-stable).
  #
  # Para habilitar:
  #   gh variable set DATABRICKS_HOST -b "https://dbc-967959c2-d585.cloud.databricks.com"
  #   gh variable set DATABRICKS_SP_CLIENT_ID -b "<application-id del SP>"
  #   gh secret   set DATABRICKS_CLIENT_SECRET -b "<OAuth secret del SP>"
  # El runner self-hosted debe tener IP allowlisted en el workspace (IP ACL activo).
  bundle-validate:
    name: databricks bundle validate
    # Self-hosted (MacBook): allowlisted IP for the workspace (hosted runners are IP-ACL-blocked).
    runs-on: self-hosted
    if: vars.DATABRICKS_HOST != ''
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Validate bundle (dev target)
        run: databricks bundle validate -t dev
      - name: Validate bundle (qa target)
        run: databricks bundle validate -t qa
      - name: Validate bundle (prd target)
        run: databricks bundle validate -t prd

  # ── Pre-merge deploy + integration tests + AI Promotion Gate (the merge gate) ──
  # Proves the PR ACTUALLY deploys, passes integration tests, AND that its model change
  # survives the AI Promotion Gate — all BEFORE it can merge, so a degraded model or a
  # broken change can never land on main. Deploys to an ISOLATED per-PR dev path
  # (dev_suffix=-pr<N>) so concurrent PRs never collide, runs the serverless integration
  # tests, then runs the training job (train → register → AI promotion gate → promote in
  # the dev schema). If Gate 2 BLOCKS a degraded challenger, the job fails → this check
  # fails → the merge is blocked. Finally tears the ephemeral deployment down.
  # Make this a REQUIRED status check on main (branch protection) so it actually blocks merge.
  # Post-merge deploy.yml then only promotes the already-validated change to qa → prod (gated).
  # PR-only: push:main is handled by deploy.yml.
  integration:
    name: deploy + integration tests + Gate 2 (dev)
    if: github.event_name == 'pull_request' && vars.DATABRICKS_HOST != ''
    runs-on: self-hosted
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      MODELOPS_TEST_SCHEMA: agentic2_mlops_dev
      PR_SUFFIX: "-pr${{ github.event.pull_request.number }}"
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy PR to an isolated dev path
        run: databricks bundle deploy -t dev --var="dev_suffix=${PR_SUFFIX}"
      - name: Serverless integration tests
        run: |
          python3 -m venv .venv-it && . .venv-it/bin/activate
          # mlflow + scikit-learn/numpy/pyyaml are needed by tests/test_demand_forecaster.py
          # (the metric-regression gate) and the src/ml training code it imports.
          pip install --quiet --disable-pip-version-check "databricks-connect>=15.4,<16" "databricks-sdk>=0.30" pytest "mlflow>=3.0" "scikit-learn>=1.3" numpy pyyaml
          pytest tests/ -v --tb=short
      - name: Gate 2 — train + AI promotion gate (blocks merge if the model degrades)
        # Runs the per-PR training job: train → register @challenger → promotion_gate → promote.
        # The gate compares the challenger vs the dev @champion; on BLOCK the job fails, this
        # step fails, and the required check blocks the merge — so a degraded model never
        # reaches main. On APPROVE the challenger becomes the new dev @champion.
        run: databricks bundle run model_training_job -t dev --var="dev_suffix=${PR_SUFFIX}"
      - name: Tear down the ephemeral PR deployment
        if: always()
        run: databricks bundle destroy -t dev --var="dev_suffix=${PR_SUFFIX}" --auto-approve || true

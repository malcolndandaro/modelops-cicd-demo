name: deploy

# Post-merge pipeline: on push to main → deploy dev → [manual gate: qa] → deploy qa
# + train/gate → [manual gate: prod] → deploy prod + train/gate.
#
# Model lifecycle: the change is FIRST validated PRE-MERGE (train → register → AI promotion
# gate → promote in dev, as a required check in pr-checks.yml) — if Gate 2 blocks a degraded
# model, the merge itself is blocked and main never receives the bad change. Post-merge, each
# ENVIRONMENT then trains + validates + promotes its OWN model in its OWN schema behind the
# same gate: qa trains in agentic2_mlops_staging, prod in agentic2_mlops_prod. So every env
# has a model that was gated against that env's data, not a re-used dev artifact.
# The qa/prod gates are GitHub Environments with required reviewers — each promotion
# pauses for a human approval (hand the customer the button). "prod" is a sandbox schema
# (agentic2_mlops_prod), so the live promotion is safe to run in the demo.
on:
  push:
    branches: [main]
    # Docs-only commits shouldn't fire the dev→qa→prod deploy cascade.
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

# One deploy pipeline per branch: prevents a second push from double-queuing the
# qa/prod approvals or racing a stale commit to prod behind a parked gate.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never kill an approved, mid-deploy run

jobs:
  deploy-dev:
    name: Promote to shared dev
    # Promotion only: deployability + the serverless integration tests already ran (and
    # gated the merge) on the PR via pr-checks → "integration" job, against an isolated
    # per-PR dev. Post-merge just promotes the proven change to the SHARED dev.
    # Self-hosted (MacBook): IP-allowlisted; hosted runners are rejected by the workspace IP ACL.
    runs-on: self-hosted
    if: vars.DATABRICKS_HOST != ''
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy bundle to shared dev
        run: databricks bundle deploy -t dev

  deploy-qa:
    name: Promote to qa (manual approval)
    runs-on: self-hosted
    needs: deploy-dev   # model already trained + gated + promoted pre-merge (pr-checks)
    if: vars.DATABRICKS_HOST != ''
    environment: qa   # required-reviewer gate — pauses for human approval
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy bundle to qa
        run: databricks bundle deploy -t qa
      - name: Train + Gate 2 in qa (each env trains + validates its own model)
        # Each environment trains and validates its OWN model against its OWN schema, behind
        # the same AI Promotion Gate. On the first run qa has no @champion, so the gate
        # bootstrap-approves and establishes qa's champion; later runs compare + gate.
        run: databricks bundle run model_training_job -t qa

  deploy-prod:
    name: Promote to prod (manual approval)
    runs-on: self-hosted
    needs: deploy-qa   # waits for qa to deploy AND its approval
    if: vars.DATABRICKS_HOST != ''
    environment: prod   # required-reviewer gate — pauses for a separate human approval
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: Deploy bundle to prod (sandbox schema agentic2_mlops_prod)
        run: databricks bundle deploy -t prd
      - name: Train + Gate 2 in prod (each env trains + validates its own model)
        # Same pattern as qa: prod trains + gates + promotes its own model in the prod
        # schema. First run bootstrap-approves and establishes prod's @champion.
        run: databricks bundle run model_training_job -t prd

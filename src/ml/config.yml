# Versioned training configuration for the demand_forecaster model.
# Changes to this file drive the Gate 2 config-diff shown in the promotion prompt.
# A PR that edits hyperparameters MUST also update max_acceptable_mae in this file
# AND update the regression test in tests/test_demand_forecaster.py (ML-01 rule).

model_name: demand_forecaster

# Regressor hyperparameters — RandomForestRegressor via scikit-learn.
# Editing these without updating max_acceptable_mae is a Gate 1 BLOCKER (ML-01).
hyperparameters:
  n_estimators: 100
  max_depth: 8
  min_samples_leaf: 5
  random_state: 42

# Input features used for training and inference.
# Dropping a feature here typically worsens MAE — Gate 2 will catch that.
features:
  - day_of_week
  - week_of_year
  - store_id
  - product_category
  - price
  - promotion_flag
  - lag_7d_sales
  - lag_14d_sales

# Maximum acceptable Mean Absolute Error on a 20% holdout split.
# This is the threshold the metric-regression test asserts (tests/test_demand_forecaster.py).
# MUST be updated whenever hyperparameters or features change — Gate 1 (ML-01) and
# Gate 2 (ML-03) both key off this contract.
max_acceptable_mae: 12.0
